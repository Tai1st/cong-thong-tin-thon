<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu Thôn/Buôn - Xã Dliê Ya</title>
<link rel="icon" type="image/png" href="logo.png">
<!-- Google Fonts: Montserrat & Playfair Display — đồng bộ font với index.html -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,500&family=Montserrat:wght@300;400;500;600;700;800;950&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --font-sans: "Montserrat", "Segoe UI", Roboto, Arial, "Helvetica Neue", sans-serif;
    --font-serif: "Playfair Display", "Segoe UI", serif;
    --text-xs: 12px;
    --text-sm: 13px;
    --text-md: 14px;
    --text-base: 15px;
    --text-lg: 18px;
    --text-xl: 22px;
    --bg: #eef8f1;
    --card: #fff;
    --line: #e2e8f0;
    --ink: #1f2937;
    --muted: #64748b;
    --brand: #9c3000;
    --brand-dark: #802000;
    --blue: #2563eb;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    font-size: var(--text-md);
    line-height: 1.5;
    background:
      radial-gradient(circle at 18% 12%, rgba(22, 163, 74, .10), transparent 30%),
      radial-gradient(circle at 82% 6%, rgba(14, 165, 233, .09), transparent 28%),
      linear-gradient(180deg, #f5fbf7 0%, var(--bg) 42%, #e8f5ef 100%);
    color: var(--ink);
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: #fff;
    border-bottom: 1px solid var(--line);
    padding: 18px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    align-items: center;
  }
  .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .brand img {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    object-fit: cover;
    flex: 0 0 auto;
    box-shadow: 0 8px 18px rgba(156, 48, 0, .08);
    border: 1px solid #fed7aa;
  }
  .brand-copy { min-width: 0; }
  .brand h1 { margin: 0; color: var(--brand); font-size: 28px; line-height: 1.25; font-weight: 800; font-family: var(--font-serif); }
  .brand span { display: block; color: var(--muted); font-size: var(--text-base); line-height: 1.4; margin-top: 4px; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--brand);
    font-weight: 700;
    font-size: var(--text-sm);
    text-decoration: none;
    border: 1px solid #fed7aa;
    background: #fff7ed;
    border-radius: 999px;
    padding: 9px 16px;
    white-space: nowrap;
  }
  .back-link:hover { background: #ffedd5; }
  * { box-sizing: border-box; }
  input {
    width: 100%;
    border: 2px solid var(--line);
    border-radius: 7px;
    padding: 11px 14px;
    min-height: 46px;
    outline: none;
    font: inherit;
    background: #fff;
  }
  input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, .12); }
  button {
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: #334155;
    font: inherit;
    font-weight: 600;
    padding: 10px 14px;
    min-height: 42px;
    cursor: pointer;
  }
  .icon { width: 17px; height: 17px; flex: 0 0 auto; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .with-icon { display: inline-flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; }
  button.primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
    min-width: 82px;
    min-height: 46px;
    box-shadow: 0 2px 5px rgba(156, 48, 0, .16);
  }
  button.primary:hover { background: var(--brand-dark); }
  .search { position: relative; }
  .search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    max-height: 245px;
    overflow: auto;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 14px 28px rgba(15, 23, 42, .14);
    display: none;
    z-index: 2000;
  }
  .suggestions button {
    width: 100%;
    border: 0;
    border-bottom: 1px solid #f1f5f9;
    border-radius: 0;
    text-align: left;
    color: #334155;
    background: #fff;
    padding: 12px 14px;
  }
  .suggestions button:hover { background: #f8fafc; color: var(--brand); }
  .main { width: min(1120px, calc(100% - 32px)); margin: 18px auto 0; }
  .map-search {
    position: relative;
    z-index: 50;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
  }
  .map-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 5px 16px rgba(15, 23, 42, .06);
  }
  #map {
    width: 100%;
    height: 560px;
    min-height: 420px;
    background: #eef2f7;
  }
  /* leaflet.css tự set font Helvetica Neue/Arial cho .leaflet-container,
     đè lên font chữ mặc định của trang (Segoe UI) — trả lại đúng font-sans
     của trang cho toàn bộ bản đồ (popup, control, attribution...). */
  .leaflet-container { font-family: var(--font-sans) !important; }
  .leaflet-interactive.region-poly { cursor: pointer; }
  .leaflet-interactive.area-border-selected {
    stroke-dasharray: 14 7;
    animation: areaBorderRun .72s linear infinite;
    stroke-linecap: round;
    filter: drop-shadow(0 0 4px rgba(225, 29, 72, .34));
  }
  @keyframes areaBorderRun { to { stroke-dashoffset: -40; } }
  .area-label.leaflet-tooltip {
    background: transparent;
    border: 0;
    box-shadow: none;
    color: rgba(15, 23, 42, .82);
    font-family: var(--font-sans);
    font-size: 10.5px;
    font-weight: 800;
    line-height: 1.18;
    padding: 0 2px;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
    text-shadow:
      0 1px 0 rgba(255, 255, 255, .98),
      1px 0 0 rgba(255, 255, 255, .98),
      0 -1px 0 rgba(255, 255, 255, .98),
      -1px 0 0 rgba(255, 255, 255, .98);
  }
  .area-label.leaflet-tooltip::before { display: none; }
  .area-label.is-small.leaflet-tooltip { font-size: 9.5px; }
  .area-label.is-tiny.leaflet-tooltip { font-size: 8.5px; }
  .toast {
    position: fixed;
    z-index: 9000;
    top: 76px;
    right: 18px;
    background: #ecfdf5;
    color: #166534;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 12px 14px;
    font-weight: 800;
    box-shadow: 0 14px 28px rgba(15, 23, 42, .14);
    display: none;
  }
  .locate-control a {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #334155;
    background: #fff;
  }
  .locate-control a:hover { color: var(--brand); background: #f8fafc; }
  .locate-control a.locating svg { animation: locateSpin 1s linear infinite; }
  .locate-control svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
  @keyframes locateSpin { to { transform: rotate(360deg); } }
  .user-location-dot {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    background: #2563eb;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px #2563eb, 0 2px 6px rgba(0,0,0,.35);
  }
  .pin-marker {
    filter: drop-shadow(0 3px 3px rgba(15, 23, 42, .35));
    transition: transform .12s ease;
  }
  .pin-marker:hover { transform: scale(1.08) translateY(-1px); }
  .pin-marker-with-logo { position: relative; }
  .pin-marker-logo {
    position: absolute;
    top: 5.5px;
    left: 6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    object-fit: cover;
    pointer-events: none;
  }
  .leaflet-popup-content-wrapper {
    border-radius: 12px;
    box-shadow: 0 14px 28px rgba(15, 23, 42, .18);
  }
  .leaflet-popup-content { margin: 13px 16px; min-width: 190px; }
  .leaflet-popup-tip-container { width: 24px; height: 12px; }
  .map-popup-title {
    font-weight: 800;
    font-size: var(--text-base);
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 3px;
    font-family: var(--font-serif);
  }
  .map-popup-meta {
    font-size: var(--text-sm);
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 9px;
  }
  .map-popup-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--blue);
    text-decoration: none;
  }
  .map-popup-link:hover { text-decoration: underline; }
  .map-popup-link svg { width: 14px; height: 14px; flex: 0 0 auto; }
  .leaflet-popup-close-button {
    color: var(--muted) !important;
    font-size: 20px !important;
    top: 8px !important;
    right: 10px !important;
  }
  .leaflet-popup-close-button:hover { color: var(--brand) !important; }
  aside {
    border-left: 1px solid var(--line);
    background: #fff;
    min-height: 0;
    overflow: auto;
    max-height: 560px;
    padding: 0;
  }
  .panel + .panel { border-top: 1px solid var(--line); }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border-bottom: 1px solid var(--line);
    padding: 14px 16px;
    font-size: var(--text-md);
    font-weight: 700;
    color: var(--brand);
    font-family: var(--font-serif);
  }
  .panel-body { padding: 16px; }
  .muted { color: var(--muted); font-size: var(--text-sm); line-height: 1.55; }
  .selected-title { margin: 0 0 16px; font-size: var(--text-xl); line-height: 1.25; font-weight: 800; color: var(--brand); font-family: var(--font-serif); }
  .info-table { width: 100%; border-collapse: collapse; font-size: var(--text-md); line-height: 1.5; }
  .info-table th, .info-table td { border-bottom: 1px solid #eef2f7; padding: 11px 0; vertical-align: top; text-align: left; }
  .info-table tr:last-child th, .info-table tr:last-child td { border-bottom: 0; }
  .info-table th { color: #334155; width: 39%; font-weight: 800; padding-right: 14px; }
  .info-table td { white-space: pre-line; }
  .list { display: grid; gap: 8px; margin-top: 10px; }
  .list button {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    text-align: left;
    background: #fff;
  }
  .list .item-main { min-width: 0; display: inline-flex; align-items: center; gap: 8px; }
  .list .item-main span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .list b { min-width: 28px; height: 26px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: #f8fafc; color: #0f172a; font-size: var(--text-xs); border: 1px solid #e2e8f0; }
  .list button:hover, .list button.active { border-color: var(--brand); color: var(--brand); }
  .list button.active { background: #fff7ed; }
  footer {
    width: min(1120px, calc(100% - 32px));
    margin: 26px auto 0;
    padding: 18px 0 26px;
    border-top: 1px solid #cbd5e1;
    text-align: center;
    color: #94a3b8;
    font-size: var(--text-xs);
    font-weight: 600;
  }
  .units-section {
    width: min(1120px, calc(100% - 32px));
    margin: 26px auto 0;
    padding-top: 24px;
    border-top: 1px solid #cbd5e1;
  }
  .units { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .unit-card {
    background: #fff;
    border: 1px solid #d8e0ea;
    border-radius: 10px;
    min-height: 98px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(15, 23, 42, .06);
  }
  .unit-card img { width: 54px; height: 54px; object-fit: contain; flex: 0 0 auto; border-radius: 8px; }
  .unit-card b { display: block; color: #1f2937; font-size: var(--text-md); line-height: 1.35; font-weight: 700; }
  .unit-card a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
    color: var(--blue);
    font-size: var(--text-sm);
    font-weight: 700;
    text-decoration: none;
  }
  @media (max-width: 900px) {
    header { grid-template-columns: minmax(0, 1fr) auto; gap: 12px; padding: 14px 16px; }
    .brand { gap: 10px; }
    .brand h1 { font-size: 20px; }
    .brand span { font-size: var(--text-sm); }
    .brand img { width: 44px; height: 44px; border-radius: 11px; }
    .map-layout { grid-template-columns: 1fr; }
    #map { height: 62vh; min-height: 380px; }
    aside { border-left: 0; border-top: 1px solid var(--line); max-height: none; }
    .back-link span.label { display: none; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo.png" alt="Logo Thôn Đoàn Kết">
      <div class="brand-copy">
        <h1>Xã Dliê Ya</h1>
        <span>Tra cứu thông tin thôn/buôn trong một chạm</span>
      </div>
    </div>
    <a href="index.html" class="back-link with-icon">
      <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
      <span class="label">Về trang chủ</span>
    </a>
  </header>

  <section class="main">
    <div class="map-search">
      <div class="search">
        <div class="search-row">
          <input id="searchInput" placeholder="Nhập tên thôn, buôn..." autocomplete="off" spellcheck="false">
          <button class="primary with-icon" id="searchBtn" type="button">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.5-3.5"></path></svg>
            Tra cứu
          </button>
        </div>
        <div class="suggestions" id="suggestions"></div>
      </div>
    </div>

    <div class="map-layout">
      <div id="map"></div>
      <aside>
        <section class="panel">
          <div class="panel-head">
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M9 15h6"></path><path d="M9 11h2"></path></svg>
            Kết quả tra cứu
          </div>
          <div class="panel-body" id="details"></div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg>
            Danh sách thôn/buôn
          </div>
          <div class="panel-body">
            <div class="muted" id="summary"></div>
            <div class="list" id="featureList"></div>
          </div>
        </section>
      </aside>
    </div>
  </section>

  <section class="units-section">
    <div class="units" id="units"></div>
  </section>

  <footer>Cổng Thông Tin Điện Tử Thôn Đoàn Kết &middot; Xã Dliê Ya &middot; Đắk Lắk</footer>
  <div class="toast" id="toast"></div>

  // ---------------------------------------------------------------------
  // Bản đồ thật (Leaflet + OpenStreetMap) — REGIONS[].latlngs là tọa độ
  // lat/lng thật lấy từ GeoJSON, không cần suy nội/quy đổi gì thêm.
  // Diện tích tương đối (shoelace trên latlngs) chỉ để xếp hạng cỡ chữ
  // nhãn tên thôn (thôn nhỏ trên bản đồ thì chữ cũng nhỏ lại).
  function polygonArea(points) {
    var area = 0;
    for (var i = 0; i < points.length; i++) {
      var j = (i + 1) % points.length;
      area += points[i][0] * points[j][1] - points[j][0] * points[i][1];
    }
    return Math.abs(area) / 2;
  }

  var areas = REGIONS.map(function (r) { return polygonArea(r.latlngs); }).sort(function (a, b) { return a - b; });
  var p20 = areas[Math.floor(areas.length * 0.2)];
  var p50 = areas[Math.floor(areas.length * 0.5)];
  function sizeClassFor(name) {
    var region = REGIONS.find(function (r) { return r.name === name; });
    var a = polygonArea(region.latlngs);
    if (a <= p20) return "is-tiny";
    if (a <= p50) return "is-small";
    return "";
  }

  var map = L.map("map", { scrollWheelZoom: true });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  // ---------------------------------------------------------------------
  // Nút định vị vị trí hiện tại — dùng Geolocation API có sẵn của trình
  // duyệt (miễn phí, không cần key, không cần thư viện thêm). Yêu cầu
  // trang chạy trên context an toàn (https hoặc localhost) — mở trực tiếp
  // bằng file:// một số trình duyệt (Chrome) sẽ chặn quyền định vị.
  var LocateControl = L.Control.extend({
    options: { position: "topright" },
    onAdd: function () {
      var container = L.DomUtil.create("div", "leaflet-bar leaflet-control locate-control");
      var link = L.DomUtil.create("a", "", container);
      link.href = "#";
      link.title = "Định vị vị trí hiện tại";
      link.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3"></path><path d="M12 19v3"></path><path d="M2 12h3"></path><path d="M19 12h3"></path></svg>';
      L.DomEvent.on(link, "click", L.DomEvent.stop).on(link, "click", function () { locateUser(link); });
      return container;
    }
  });
  map.addControl(new LocateControl());

  var userMarker = null, userAccuracyCircle = null;
  function locateUser(triggerLink) {
    if (!navigator.geolocation) { showToast("Trình duyệt không hỗ trợ định vị."); return; }
    if (triggerLink) triggerLink.classList.add("locating");
    showToast("Đang xác định vị trí của bạn...");
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        if (triggerLink) triggerLink.classList.remove("locating");
        var latlng = [pos.coords.latitude, pos.coords.longitude];
        if (userMarker) {
          userMarker.setLatLng(latlng);
          userAccuracyCircle.setLatLng(latlng).setRadius(pos.coords.accuracy);
        } else {
          userAccuracyCircle = L.circle(latlng, {
            radius: pos.coords.accuracy,
            color: "#2563eb",
            weight: 1,
            fillColor: "#2563eb",
            fillOpacity: 0.08
          }).addTo(map);
          userMarker = L.marker(latlng, {
            icon: L.divIcon({ className: "user-location-dot", iconSize: [16, 16] })
          }).addTo(map).bindTooltip("Vị trí của bạn", { direction: "top", offset: [0, -8] });
        }
        map.flyTo(latlng, 16);
        showToast("Đã định vị vị trí của bạn.");
      },
      function (err) {
        if (triggerLink) triggerLink.classList.remove("locating");
        var reason = err.code === 1 ? "bạn đã từ chối quyền truy cập vị trí" :
          err.code === 2 ? "không xác định được vị trí" : "hết thời gian chờ";
        showToast("Không thể định vị: " + reason + ".");
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  var layerByName = {};
  var polyGroup = [];
  REGIONS.forEach(function (r) {
    if (!r.latlngs.length) return;
    var poly = L.polygon(r.latlngs, {
      className: "region-poly",
      color: r.color,
      weight: 1.8,
      opacity: 0.95,
      fillColor: r.color,
      fillOpacity: 0.34
    }).addTo(map);
    poly.bindTooltip(r.name, {
      permanent: true,
      direction: "center",
      className: "area-label " + sizeClassFor(r.name)
    });
    poly.on("click", function () { selectVillage(r.name); });
    layerByName[r.name] = poly;
    polyGroup.push(poly);
  });
  if (polyGroup.length) map.fitBounds(L.featureGroup(polyGroup).getBounds(), { padding: [12, 12] });

  // ---------------------------------------------------------------------
  // Vị trí hộ gia đình đã định vị GPS — ưu tiên đọc từ localStorage cùng
  // origin (dữ liệu thật sau khi ai đó đã dùng dashboard Cư dân/Trưởng
  // thôn trên trình duyệt này); nếu chưa có thì lùi về defaultGpsCoords/
  // defaultResidents từ js/data.js (đã nạp ở <head>) — cùng 1 nguồn dữ
  // liệu dân cư với toàn bộ app, không còn số liệu demo tách riêng.
  function readLocalJson(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  }

  // Nội dung popup marker dùng chung (tiêu đề đậm + dòng phụ mờ + link
  // Google Maps có icon) — thay cho chuỗi "<b>...</b><br>..." nối tay,
  // style riêng ở .map-popup-* trong CSS thay vì để mặc định của Leaflet.
  function mapPopupHtml(title, metaLine, mapsUrl) {
    return (
      '<div class="map-popup-title">' + title + '</div>' +
      (metaLine ? '<div class="map-popup-meta">' + metaLine + '</div>' : '') +
      '<a class="map-popup-link" href="' + mapsUrl + '" target="_blank" rel="noopener noreferrer">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-8-8 18-2-8-8-2z"></path></svg>' +
      'Xem trên Google Maps</a>'
    );
  }

  // Pin dạng giọt nước (kiểu Google Maps) dựng bằng SVG thuần thay vì
  // emoji — nhất quán trên mọi hệ điều hành/trình duyệt, có drop-shadow
  // và hover scale (xem .pin-marker ở CSS). `glyph` là 1 đoạn <path>/
  // <polyline> con (viewBox 24x24, stroke) được vẽ giữa vòng tròn trắng.
  function pinIcon(color, glyph) {
    var html =
      '<svg width="30" height="38" viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M15 0C6.716 0 0 6.716 0 15c0 10.5 15 23 15 23s15-12.5 15-23C30 6.716 23.284 0 15 0z" fill="' + color + '"></path>' +
      '<circle cx="15" cy="14.5" r="10" fill="#fff"></circle>' +
      '<g transform="translate(7.5,7) scale(0.625)" fill="none" stroke="' + color + '" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">' + glyph + '</g>' +
      '</svg>';
    return L.divIcon({ className: "pin-marker", html: html, iconSize: [30, 38], iconAnchor: [15, 38], popupAnchor: [0, -34] });
  }
  var HOUSE_GLYPH = '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>';
  var LANDMARK_GLYPH = '<path d="M3 21h18"></path><path d="M4 10h16"></path><path d="M4 10l8-6 8 6"></path><path d="M6 10v11"></path><path d="M10 10v11"></path><path d="M14 10v11"></path><path d="M18 10v11"></path>';

  // Cùng khung pin giọt nước, nhưng thay glyph vẽ tay bằng logo thật của
  // từng cơ quan (ảnh clip tròn) — dùng cho marker trụ sở cơ quan xã.
  function pinIconWithImage(color, imgUrl) {
    var html =
      '<svg width="30" height="38" viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M15 0C6.716 0 0 6.716 0 15c0 10.5 15 23 15 23s15-12.5 15-23C30 6.716 23.284 0 15 0z" fill="' + color + '"></path>' +
      '<circle cx="15" cy="14.5" r="10" fill="#fff"></circle>' +
      '</svg>' +
      '<img src="' + imgUrl + '" class="pin-marker-logo" alt="">';
    return L.divIcon({ className: "pin-marker pin-marker-with-logo", html: html, iconSize: [30, 38], iconAnchor: [15, 38], popupAnchor: [0, -34] });
  }

  var householdMarkerGroup = L.layerGroup();
  function renderHouseholdMarkers() {
    householdMarkerGroup.clearLayers();
    var gpsCoords = readLocalJson("village_gps_coords_db", null) || defaultGpsCoords;
    var houseNumbers = readLocalJson("village_house_numbers_db", {});
    var residents = readLocalJson("village_residents_db", null) || defaultResidents;

    var headByFamilyId = {};
    residents.forEach(function (r) {
      if (r.isHouseholder || !headByFamilyId[r.familyId]) headByFamilyId[r.familyId] = r;
    });

    var count = 0;
    Object.keys(gpsCoords).forEach(function (familyId) {
      var coords = gpsCoords[familyId];
      if (!coords || typeof coords.lat !== "number" || typeof coords.lng !== "number") return;
      var head = headByFamilyId[familyId];
      var houseNumber = houseNumbers[familyId];
      var label = "Hộ " + (head ? head.name : "(chưa rõ chủ hộ)");
      var marker = L.marker([coords.lat, coords.lng], {
        icon: pinIcon("#9c3000", HOUSE_GLYPH)
      }).bindPopup(
        mapPopupHtml(
          label,
          houseNumber ? "Địa chỉ: " + houseNumber : "",
          "https://www.google.com/maps?q=" + coords.lat + "," + coords.lng
        )
      );
      householdMarkerGroup.addLayer(marker);
      count++;
    });
    return count;
  }
  var householdCount = renderHouseholdMarkers();
  if (householdCount > 0) householdMarkerGroup.addTo(map);

  var currentSelected = null;
  function highlightSelected(name) {
    if (currentSelected && layerByName[currentSelected]) {
      var prevEl = layerByName[currentSelected].getElement();
      if (prevEl) prevEl.classList.remove("area-border-selected");
    }
    var layer = layerByName[name];
    if (layer) {
      layer.bringToFront();
      var el = layer.getElement();
      if (el) el.classList.add("area-border-selected");
    }
    currentSelected = name;
  }

  var toast = document.getElementById("toast");
  var toastTimer = null;
  function showToast(text) {
    toast.textContent = text;
    toast.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.style.display = "none"; }, 1800);
  }

  var featureList = document.getElementById("featureList");
  var summary = document.getElementById("summary");
  summary.textContent = REGIONS.length + " thôn/buôn có thể tra cứu";
  REGIONS.forEach(function (r, i) {
    var btn = document.createElement("button");
    btn.type = "button";
    btn.dataset.name = r.name;
    btn.innerHTML = '<span class="item-main"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"></path><circle cx="12" cy="10" r="2.5"></circle></svg><span>' + r.name + '</span></span><b>' + (i + 1) + '</b>';
    btn.addEventListener("click", function () { selectVillage(r.name); });
    featureList.appendChild(btn);
  });

  function row(label, value) {
    return '<tr><th>' + label + '</th><td>' + value + '</td></tr>';
  }

  function selectVillage(name) {
    var v = VILLAGE_DATA[name];
    if (!v) return;
    highlightSelected(name);
    showToast("Đã chọn: " + name);

    document.getElementById("details").innerHTML =
      '<h2 class="selected-title">' + v.newName + '</h2>' +
      '<table class="info-table"><tbody>' +
      row("Tên mới", v.newName) +
      row("Sáp nhập từ", v.mergedFrom) +
      row("Chi tiết thôn/buôn cũ", v.oldDetail) +
      row("Diện tích (ha)", v.area) +
      row("Dân số (người)", v.population) +
      row("Số hộ", v.households) +
      row("Bí thư chi bộ", v.secretary) +
      row("SĐT Bí thư chi bộ", v.secretaryPhone) +
      row("Thôn trưởng", v.chief) +
      row("SĐT Thôn trưởng", v.chiefPhone) +
      row("Trưởng ban CTMT", v.frontChief) +
      row("SĐT Trưởng ban CTMT", v.frontChiefPhone) +
      row("Ngày cập nhật", v.updatedAt) +
      row("Ghi chú", v.note) +
      '</tbody></table>';

    Array.prototype.forEach.call(featureList.querySelectorAll("button"), function (b) {
      b.classList.toggle("active", b.dataset.name === name);
    });
  }

  var searchInput = document.getElementById("searchInput");
  var suggestions = document.getElementById("suggestions");

  function renderSuggestions(query) {
    var q = query.trim().toLowerCase();
    if (!q) { suggestions.style.display = "none"; suggestions.innerHTML = ""; return; }
    var matches = REGIONS.filter(function (r) { return r.name.toLowerCase().indexOf(q) !== -1; });
    if (!matches.length) {
      suggestions.innerHTML = '<button type="button" disabled>Không tìm thấy thôn/buôn phù hợp</button>';
      suggestions.style.display = "block";
      return;
    }
    suggestions.innerHTML = matches.map(function (r) {
      return '<button type="button" data-name="' + r.name + '"><span class="suggestion-name">' + r.name + '</span></button>';
    }).join("");
    suggestions.style.display = "block";
    Array.prototype.forEach.call(suggestions.querySelectorAll("button[data-name]"), function (b) {
      b.addEventListener("click", function () {
        searchInput.value = b.dataset.name;
        suggestions.style.display = "none";
        selectVillage(b.dataset.name);
      });
    });
  }

  searchInput.addEventListener("input", function () { renderSuggestions(searchInput.value); });
  searchInput.addEventListener("focus", function () { renderSuggestions(searchInput.value); });
  document.addEventListener("click", function (e) {
    if (!e.target.closest(".search")) suggestions.style.display = "none";
  });

  function runSearch() {
    var q = searchInput.value.trim().toLowerCase();
    var match = REGIONS.find(function (r) { return r.name.toLowerCase() === q; }) ||
      REGIONS.find(function (r) { return r.name.toLowerCase().indexOf(q) !== -1; });
    if (match) { suggestions.style.display = "none"; selectVillage(match.name); }
  }
  document.getElementById("searchBtn").addEventListener("click", runSearch);
  searchInput.addEventListener("keydown", function (e) { if (e.key === "Enter") runSearch(); });


  var UNITS = [{"name":"Trụ sở Đảng ủy xã","logo":"https://tracuudlieya.io.vn/dlieya-co-dang.jpg","url":"https://www.google.com/maps/@13.0348038,108.3259734,20z?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D"},{"name":"Trụ sở Hội đồng nhân dân - Ủy ban Nhân dân xã","logo":"https://tracuudlieya.io.vn/dlieya-ubnd.jpg","url":"https://www.google.com/maps/place/UBND+X%C3%A3+%C4%90li%C3%AA+Ya/@13.0589474,108.3549545,17z/data=!3m1!4b1!4m6!3m5!1s0x316e170019b4fd0d:0xc4cdce60a6346cd!8m2!3d13.0589474!4d108.3575294!16s%2Fg%2F11xmj28zn2?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D"},{"name":"Trụ sở Ủy ban Mặt trận tổ quốc và các tổ chức chính trị xã hội xã","logo":"https://tracuudlieya.io.vn/dlieya-mat-tran-to-quoc.jpg","url":"https://www.google.com/maps/@13.0348038,108.3259734,20z?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D"},{"name":"Trụ sở Công an xã","logo":"logo-cong-an.png","url":"https://www.google.com/maps/search/c%C3%B4ng+an+x%C3%A3+ea+t%C3%A2n/@13.1162735,108.3291873,19z?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D"}];
  var unitsEl = document.getElementById("units");
  UNITS.forEach(function (u) {
    var card = document.createElement("article");
    card.className = "unit-card";
    card.innerHTML = '<img src="' + u.logo + '" alt="' + u.name + '">' +
      '<div><b>' + u.name + '</b><a href="' + u.url + '" target="_blank" rel="noopener noreferrer">' +
      '<svg class="icon" viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-8-8-2z"></path></svg>Xem định vị</a></div>';
    unitsEl.appendChild(card);
  });

  // Định vị trụ sở các cơ quan xã lên bản đồ — tọa độ lấy trực tiếp từ
  // chính link Google Maps thật của từng đơn vị (u.url), không hardcode
  // riêng lat/lng để tránh lệch nếu link đổi. Ưu tiên dạng "!3d..!4d.."
  // (điểm place chính xác) trước dạng "@lat,lng" (tâm khung nhìn).
  function extractLatLngFromMapsUrl(url) {
    var place = url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
    if (place) return [parseFloat(place[1]), parseFloat(place[2])];
    var at = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (at) return [parseFloat(at[1]), parseFloat(at[2])];
    return null;
  }

  UNITS.forEach(function (u) {
    var latlng = extractLatLngFromMapsUrl(u.url);
    if (!latlng) return;
    L.marker(latlng, {
      icon: pinIconWithImage("#2563eb", u.logo)
    }).addTo(map).bindPopup(
      mapPopupHtml(u.name, "", u.url)
    );
  });

  // Thôn Đoàn Kết dùng logo riêng của thôn (logo.png) thay vì logo cấp xã —
  // đặt tại đúng tâm thôn (13°07'33.4"N 108°19'29.2"E, cùng điểm đã dùng
  // làm DOAN_KET_CENTER trong dashboard Cư dân).
  L.marker([13.125944, 108.324778], {
    icon: pinIconWithImage("#e11d48", "logo.png")
  }).addTo(map).bindPopup(
    mapPopupHtml("Thôn Đoàn Kết", "", "https://www.google.com/maps?q=13.125944,108.324778")
  );

  selectVillage("Thôn Đoàn kết");
</script>
